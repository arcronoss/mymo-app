<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MyMo</title>
<link rel="apple-touch-icon" href="icon.png.png">
<link rel="icon" href="./icon.png.png">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-main: #f05a8e;
    --pink-light: #f8a0bc;
    --pink-dark: #e0457a;
    --pink-deep: #d63870;
    --pink-card: #e84c82;
    --bg: #f3f3f3;
    --white: #ffffff;
    --text-dark: #2c2c2c;
    --text-gray: #888;
    --shadow-soft: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-icon: 0 3px 14px rgba(0,0,0,0.10);
  }

  html, body {
	height: 100%;
	width: 100%;
	overflow: hidden;
	background: #f05a8e;
    font-family: 'Sarabun', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-wrap {
    width: 100%;
    max-width: 390px;
    height: 100dvh;
    margin: 0 auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ─── SCROLL AREA ─── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ─── HEADER ─── */
.header {
  background: linear-gradient(145deg, #f5729e 0%, #f05a8e 40%, #e8457c 100%);

  padding: calc(46px + env(safe-area-inset-top)) 22px 38px;

  margin-top: calc(env(safe-area-inset-top) * -1);

  position: relative;
  overflow: hidden;

  /* ความโค้งด้านล่าง */
  border-radius: 0 0 45% 45% / 0 0 42px 42px;
}

  /* Decorative circles on header */
  .header::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 28px solid rgba(255,255,255,0.13);
    top: -60px; right: -40px;
  }
  .header::after {
    content: '';
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 22px solid rgba(255,255,255,0.09);
    top: 30px; right: 80px;
  }
  .header-circle-sm {
    position: absolute;
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 16px solid rgba(255,255,255,0.08);
    bottom: -20px; right: 160px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 2;
  }

.avatar {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: white;
  border: 2.5px solid rgba(255,255,255,0.6);
  overflow: hidden;
  flex-shrink: 0;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

  .account-info {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .account-label {
    color: rgba(255,255,255,0.92);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .balance-pill {
    background: rgba(200, 40, 90, 0.55);
    backdrop-filter: blur(4px);
    border-radius: 20px;
    padding: 7px 20px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .balance-amount {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }
  .balance-dots {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    display: inline;
  }
 
  .eye-icon {
    opacity: 0.85;
    flex-shrink: 0;
    display: inline;
}

  /* ─── MENU GRID ─── */
  .menu-section {
    background: var(--white);
    margin: -2px 0 10px;
    padding: 22px 16px 20px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    row-gap: 20px;
    column-gap: 6px;
  }

  .menu-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-item:active .icon-wrap {
    transform: scale(0.92);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .icon-wrap {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--white);
    box-shadow: var(--shadow-icon);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
  }

  .menu-label {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.25;
    white-space: pre-wrap;
  }

  /* ─── BANNER ─── */
  .banner-section {
    padding: 4px 16px 14px;
    background: var(--bg);
  }

  .banner-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .banner-scroll::-webkit-scrollbar { display: none; }

  .banner-card {
    background: linear-gradient(130deg, #f36097 0%, #e8427c 55%, #d63068 100%);
    border-radius: 16px;
    padding: 18px 20px;
    min-width: 270px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 18px rgba(240,90,142,0.35);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .banner-card:active { transform: scale(0.97); }

  .banner-card::before {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 20px solid rgba(255,255,255,0.1);
    top: -30px; right: 60px;
  }

  .banner-text-group { position: relative; z-index: 1; }
  .banner-title {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .banner-sub {
    color: rgba(255,255,255,0.88);
    font-size: 13px;
    font-weight: 400;
  }

  .banner-icon {
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .banner-card-blue {
    background: linear-gradient(130deg, #5b8cf5 0%, #3a6bdf 100%);
    min-width: 160px;
    box-shadow: 0 4px 18px rgba(60,100,220,0.30);
  }

  /* ─── NOTIFICATION ─── */
  .notif-section {
    background: var(--white);
    margin: 0;
    padding: 38px 24px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .notif-text {
    font-size: 15px;
    color: var(--text-gray);
    font-weight: 400;
  }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    background: var(--white);
    border-top: 1px solid #ebebeb;
    padding: 10px 0 max(12px, env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    flex-shrink: 0;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    flex: 1;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
    padding: 2px 0;
  }
  .nav-item:active { opacity: 0.7; }

  .nav-label {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-gray);
  }
  .nav-item.active .nav-label { color: var(--pink-main); }

  svg { display: block; }
</style>
</head>

<script>
let balanceVisible = true;

function toggleBalance() {
  balanceVisible = !balanceVisible;

  const amount = document.getElementById('balanceAmount');
  const dots = document.getElementById('balanceDots');
  const eye = document.getElementById('eyeIcon');

  if (balanceVisible) {

    // แสดงยอดเงิน
    amount.style.display = '';
    dots.style.display = 'none';

    // แสดง icon ตา
    eye.style.display = '';

  } else {

    // ซ่อนยอดเงิน
    amount.style.display = 'none';
    dots.style.display = '';

    // ซ่อน icon ตา
    eye.style.display = 'none';
  }
}

// เริ่มต้นให้ซ่อนข้อความ "แสดงยอดเงิน"
document.getElementById('balanceDots').style.display = 'none';
</script>
